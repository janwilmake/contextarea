<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextArea Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        .editor-container {
            position: relative;
            margin-bottom: 20px;
        }

        #contextarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            font-size: 16px;
            line-height: 1.5;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }

        .upload-button {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.9;
        }

        .upload-button:hover {
            opacity: 1;
        }

        .context-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .context-card {
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow: hidden;
            transition: box-shadow 0.3s, transform 0.3s;
        }

        .context-card.active {
            box-shadow: 0 0 0 2px #3498db;
            transform: translateY(-3px);
        }

        .card-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background-color: #f1f1f1;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .card-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .card-button {
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .card-button:hover {
            background-color: #2980b9;
        }

        .hidden {
            display: none;
        }

        .file-input {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>ContextArea Demo</h1>
        <div class="editor-container">
            <textarea id="contextarea" placeholder="Paste text, URLs, or drop files here..."></textarea>
            <button class="upload-button">Upload Files</button>
            <input type="file" class="file-input" multiple>
        </div>
        <div class="context-cards"></div>
    </div>

    <script src="https://contextarea.com/lib.js"></script>
</body>

</html>
